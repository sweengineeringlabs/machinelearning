[workspace]
resolver = "2"
members = [
    # Tensor math
    "main/features/tensor",
    # Normalization
    "main/features/normalization",
    # Activation
    "main/features/activation",
    # Embedding
    "main/features/embedding/conversion",
    "main/features/embedding/server",
    # LLM inference stack
    "main/features/inference/layers",
    "main/features/hub",
    "main/features/inference/model",
    "main/features/inference/generation",
    "main/features/inference/tokenizer",
    "main/features/inference/quant",
    "main/features/inference/gguf",
    "main/features/inference/quantize",
    "main/features/inference/cli",
    "main/features/inference/daemon",
    # Training
    "main/features/training",
    # Model architectures
    "main/features/architectures",
]
exclude = ["main/features/inference", "main/features/embedding"]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["phdsystems <developer@phdsystems.com>"]
repository = "https://github.com/sweengineeringlabs/machinelearning"

[workspace.dependencies]
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Async
tokio = { version = "1", features = ["full"] }
# Error handling
thiserror = "2"
anyhow = "1"
# CLI
clap = { version = "4", features = ["derive"] }
# Utilities
rand = "0.8"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
regex = "1"
dirs = "6"
# HTTP
reqwest = { version = "0.12", features = ["json"] }
futures-util = "0.3"
# Testing
approx = "0.5"
# Logging
log = "0.4"
env_logger = "0.11"
# Internal crates
swe-ml-tensor = { path = "main/features/tensor" }
swe-ml-normalization = { path = "main/features/normalization" }
swe-ml-activation = { path = "main/features/activation" }
swe-ml-embedding = { path = "main/features/embedding/conversion" }
swe-ml-embed-server = { path = "main/features/embedding/server" }
rustml-inference-layers = { path = "main/features/inference/layers" }
rustml-hub = { path = "main/features/hub" }
rustml-model = { path = "main/features/inference/model" }
rustml-generation = { path = "main/features/inference/generation" }
rustml-tokenizer = { path = "main/features/inference/tokenizer" }
rustml-quant = { path = "main/features/inference/quant" }
rustml-gguf = { path = "main/features/inference/gguf" }
swe-ml-architectures = { path = "main/features/architectures" }
swe-ml-training = { path = "main/features/training" }
swellmd = { path = "main/features/inference/daemon" }
# Shared deps for quant/gguf crates
bytemuck = { version = "1", features = ["extern_crate_alloc"] }
half = { version = "2.3", features = ["bytemuck"] }
rayon = "1.8"
memmap2 = "0.9"
crc32fast = "1.3"
hf-hub = "0.4"
smallvec = { version = "1.11", features = ["const_generics"] }
safetensors = "0.3"
tokenizers = "0.21"
swe-readline = { path = "../swebash/swe-readline" }

[profile.release]
lto = "thin"
