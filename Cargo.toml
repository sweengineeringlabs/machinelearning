[workspace]
resolver = "2"
members = [
    # Tensor math
    "main/features/tensor",
    # LLM inference stack
    "main/features/llm/nn",
    "main/features/llm/hub",
    "main/features/llm/nlp",
    "main/features/llm/tokenizer",
    "main/features/llm/quant",
    "main/features/llm/gguf",
    "main/features/llm/quantize",
    "main/features/llm/cli",
    "main/features/llm/daemon",
    # Training
    "main/features/training",
    # Model architectures
    "main/features/architectures",
]
exclude = ["main/features/llm"]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["phdsystems <developer@phdsystems.com>"]
repository = "https://github.com/sweengineeringlabs/machinelearning"

[workspace.dependencies]
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Async
tokio = { version = "1", features = ["full"] }
# Error handling
thiserror = "2"
anyhow = "1"
# CLI
clap = { version = "4", features = ["derive"] }
# Utilities
rand = "0.8"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
regex = "1"
dirs = "6"
# HTTP
reqwest = { version = "0.12", features = ["json"] }
futures-util = "0.3"
# Testing
approx = "0.5"
# Logging
log = "0.4"
env_logger = "0.11"
# Internal crates
swe-ml-tensor = { path = "main/features/tensor" }
rustml-nn = { path = "main/features/llm/nn" }
rustml-hub = { path = "main/features/llm/hub" }
rustml-nlp = { path = "main/features/llm/nlp" }
rustml-tokenizer = { path = "main/features/llm/tokenizer" }
rustml-quant = { path = "main/features/llm/quant" }
rustml-gguf = { path = "main/features/llm/gguf" }
swe-ml-architectures = { path = "main/features/architectures" }
swe-ml-training = { path = "main/features/training" }
swellmd = { path = "main/features/llm/daemon" }
# Shared deps for quant/gguf crates
bytemuck = { version = "1", features = ["extern_crate_alloc"] }
half = { version = "2.3", features = ["bytemuck"] }
rayon = "1.8"
memmap2 = "0.9"
crc32fast = "1.3"
hf-hub = "0.4"
smallvec = { version = "1.11", features = ["const_generics"] }
safetensors = "0.3"
tokenizers = "0.21"
swe-readline = { path = "../swebash/swe-readline" }

[profile.release]
lto = "thin"
