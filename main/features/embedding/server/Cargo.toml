[package]
name = "swe-ml-embed-server"
description = "Standalone embedding HTTP server — serves /v1/embeddings"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[[bin]]
name = "swe-ml-embed"
path = "src/bin/embed_serve.rs"

[dependencies]
swe-ml-embedding.workspace = true
swe-ml-tensor.workspace = true
rustml-model.workspace = true
rustml-gguf.workspace = true
rustml-tokenizer.workspace = true
rustml-inference-layers.workspace = true
axum = { version = "0.8", features = ["json"] }
tokio.workspace = true
clap.workspace = true
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
log.workspace = true
env_logger.workspace = true
