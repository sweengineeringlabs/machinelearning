name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch — saves CI minutes during
# rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Root workspace — foundation crates (tensor, normalization, activation,
  # architectures, training, hub, embedding/conversion). Pure Rust, runs
  # on all three platforms so any platform-specific regression in the
  # foundations shows up before the llmserv jobs.
  root:
    name: root — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Channel read from rust-toolchain.toml at the repo root (1.93).
        # Target auto-selected by host (x86_64-unknown-linux-gnu,
        # x86_64-apple-darwin / aarch64-apple-darwin, x86_64-pc-windows-msvc).
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build
        run: cargo build --release --workspace --locked

      - name: Test
        run: cargo test --release --workspace --locked

  # llmserv workspace default build — no C++ toolchain, no llama.cpp.
  # This is the path every consumer who doesn't opt into
  # backend-llama-cpp will hit, so it has to stay fast and
  # toolchain-free on every platform.
  llmserv-pure-rust:
    name: llmserv pure-Rust — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "llmserv -> target"

      - name: Build
        working-directory: llmserv
        run: cargo build --release --workspace --locked

      - name: Test
        working-directory: llmserv
        run: cargo test --release --workspace --locked

  # llmserv workspace with the llama.cpp backend feature active on all
  # three platforms. Each OS uses its native C/C++ toolchain paired
  # with Rust's default target for that host:
  #
  #   ubuntu-latest  → x86_64-unknown-linux-gnu   + apt gcc + cmake
  #   macos-latest   → aarch64-apple-darwin       + Xcode clang + cmake
  #   windows-latest → x86_64-pc-windows-msvc     + pre-installed MSVC + cmake
  #
  # Today the skeleton crate has no external C++ dep, so cmake/MSVC
  # aren't exercised yet. Once the llama-cpp-2 API wiring lands
  # (BACKLOG P7.B step 4 completion), these become load-bearing —
  # installing them now means no CI churn when that lands.
  llmserv-llama-cpp:
    name: llmserv llama-cpp — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          components: rustfmt, clippy

      - name: Install C++ toolchain + cmake (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Install cmake (macOS — clang is pre-installed)
        if: matrix.os == 'macos-latest'
        run: brew install cmake

      - name: Install libclang (Windows, via scoop)
        if: matrix.os == 'windows-latest'
        # libclang.dll isn't in the GitHub-hosted image by default;
        # bindgen (used by llama-cpp-sys-2) requires it. scoop install
        # is user-scope, no admin needed. cmake + MSVC are already
        # on PATH via the windows-latest image.
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Invoke-RestMethod get.scoop.sh | Invoke-Expression
          scoop install llvm

      - name: Set MSVC CRT alignment (Windows)
        if: matrix.os == 'windows-latest'
        # Every C/C++ object on the link line must use the same CRT.
        # Rust's `-msvc` target uses dynamic CRT (/MD); force llama.cpp
        # (via cmake) and esaxx-rs (via cc-rs) to match.
        shell: bash
        run: |
          echo "CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL" >> $GITHUB_ENV
          echo "CFLAGS=-MD"                                  >> $GITHUB_ENV
          echo "CXXFLAGS=-MD"                                >> $GITHUB_ENV

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "llmserv -> target"
          key: llama-cpp

      - name: Build with backend-llama-cpp feature
        working-directory: llmserv
        run: cargo build --release -p swe-inference-systemd --features backend-llama-cpp --locked

      - name: Test with backend-llama-cpp feature
        working-directory: llmserv
        shell: bash
        run: |
          cargo test --release -p swe-inference-systemd --features backend-llama-cpp --locked
          cargo test --release -p rustml-backend-llama-cpp --features llama-cpp --locked
          cargo test --release -p llmbackend --locked
