# Configuration for cbindgen: generate include/llmserv.h from the Rust source.
# Usage: `cbindgen --config cbindgen.toml --crate swe-inference-ffi --output include/llmserv.h`
# Or run `cargo build -p swe-inference-ffi` to regenerate via build.rs.

language = "C"
header = """/*
 * llminference.h — C-ABI bindings for llminference.
 *
 * Auto-generated by cbindgen from swe-inference-ffi. Do not edit by hand.
 */"""
include_guard = "LLMINFERENCE_H"
pragma_once = true

[export]
prefix = ""
# Force inclusion of LlmError — cbindgen would otherwise drop it because
# the extern fns return c_int, not LlmError.
include = ["LlmError"]

[parse]
parse_deps = false

[fn]
prefix = ""

[enum]
prefix_with_name = false
rename_variants = "ScreamingSnakeCase"
