# Cargo aliases for the llminference workspace.
#
# The build target itself is NOT set here. Each host uses whatever its
# rustup default is — x86_64-unknown-linux-gnu on Linux,
# {aarch64,x86_64}-apple-darwin on macOS, x86_64-pc-windows-msvc on
# Windows. To use a non-default target (e.g. swap -msvc for -gnu on
# Windows), either:
#
#   1. Set the env var — cross-shell, per-invocation:
#        export CARGO_BUILD_TARGET=x86_64-pc-windows-gnu
#        cargo build-llama
#
#   2. Override per-command with --target:
#        cargo build-llama --target=x86_64-pc-windows-gnu
#
#   3. Add the target to your personal `~/.cargo/config.toml`:
#        [build]
#        target = "x86_64-pc-windows-gnu"
#
# Don't commit a [build] target here — that would freeze every
# contributor's output to one triple regardless of their platform.

# Note: the `llama-cpp` feature pulls in llama-cpp-2, whose build script
# uses bindgen. bindgen needs libclang.dll (Windows) / libclang.so
# (Linux) / libclang.dylib (macOS) at build time. Install options:
#   Linux   → apt install libclang-dev
#   macOS   → ships with Xcode CLI tools
#   Windows → scoop install llvm  (or choco / llvm.org installer in
#             elevated shell). scoop adds its bin dir to User PATH so
#             bindgen auto-detects libclang; no LIBCLANG_PATH override
#             should be needed after a fresh shell.
#
# If bindgen can't find libclang, set LIBCLANG_PATH in your own
# environment (shell or ~/.cargo/config.toml) pointing at the dir
# containing libclang. Don't pin a personal path here — it'd break
# every other contributor.

# Windows MSVC CRT alignment for the `llama-cpp` feature.
#
# Building with `--features backend-llama-cpp` on Windows requires
# THREE env vars to be set before cargo invocations, otherwise link
# fails with `LNK1319: mismatches detected`. Root cause: Rust on the
# `-msvc` target uses dynamic CRT (/MD); llama.cpp's cmake and
# esaxx-rs's cc-rs both default to static CRT (/MT). Every compiled
# C/C++ object on the link line has to agree.
#
# Set these in your shell before the build (PowerShell / bash both):
#
#     export CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL
#     export CFLAGS=-MD
#     export CXXFLAGS=-MD
#     cargo build-llama
#
# These aren't pinned in `[env]` here because `-MD` is an MSVC-specific
# flag that gcc/clang on Linux/macOS would reject (where it means
# something else — "emit dependency file" — and changes semantics).
# Cargo's `[env]` is global, not OS-conditional. CI sets them only on
# the Windows job; see `.github/workflows/ci.yml`.

[alias]
# Backend-llama-cpp convenience. Runs the daemon build / tests with
# the llama.cpp-backed Model impl active. Requires a C++ toolchain on
# PATH:
#   Linux   → apt install cmake build-essential (or equivalent)
#   macOS   → Xcode CLI tools (clang) + `brew install cmake`
#   Windows → MSVC Build Tools 2022 + cmake (or MinGW paired with
#             x86_64-pc-windows-gnu Rust target)
build-llama        = "build --release -p swe-inference-systemd --features backend-llama-cpp --locked"
test-llama         = "test  --release -p swe-inference-systemd --features backend-llama-cpp --locked"

# Run the backend crate's own tests with its inner feature active.
# Useful when iterating on swe-inference-backend-llama-cpp in isolation.
test-backend-llama = "test  --release -p swe-inference-backend-llama-cpp --features llama-cpp --locked"
